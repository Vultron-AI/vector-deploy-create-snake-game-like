<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App</title>
  <script data-vector-analytics>
(function(){
  var API='https://api.govector.ai';
  var AID='62e6f540-5331-440a-8a00-beaf24fba80e';
  if(!API||!AID)return;
  var SK='_v_sid';
  var sid=sessionStorage.getItem(SK);
  if(!sid){sid=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem(SK,sid)}
  function send(t){
    var d=JSON.stringify({session_id:sid,event_type:t,path:location.pathname});
    if(navigator.sendBeacon){navigator.sendBeacon(API+'/api/apps/t/'+AID+'/',new Blob([d],{type:'application/json'}))}
    else{fetch(API+'/api/apps/t/'+AID+'/',{method:'POST',body:d,headers:{'Content-Type':'application/json'},keepalive:true})}
  }
  send('pageview');
  var iv=setInterval(function(){if(!document.hidden)send('heartbeat')},60000);
  document.addEventListener('visibilitychange',function(){if(document.hidden)send('heartbeat')});
  window.addEventListener('beforeunload',function(){send('heartbeat')});
})();
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/__vector-bridge.js"></script>
  </body>
</html>
